# Despliegue del cliente EagleEye en UN contenedor (Caddy sirviendo estaticos por
# HTTP), pensado para ir detras de Cloudflare Tunnel (HTTPS publico en el edge).
#
#   docker compose -f docker/docker-compose.yml up -d --build
#
# El origen sirve HTTP en el puerto ${PORT:-8080}. Tu cloudflared (ya operativo)
# enruta  https://<subdominio>.<dominio>  ->  http://localhost:${PORT}.
# Ver ADR-0011. En local, http://localhost:${PORT} es contexto seguro (la camara
# funciona en escritorio); en movil se prueba ya por el dominio publico.
#
# `restart: unless-stopped` + el daemon de Docker en arranque = sobrevive reinicios.
#
# Cuando llegue el backend (build step 4+), este compose gana servicios `app`
# (Node) y `db` (Postgres). Ver ADR-0010 (pocos servicios, no todo en una imagen).

services:
  client:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: eagleeye-client
    container_name: eagleeye-client
    # Puerto del host (cloudflared enruta el subdominio aqui). Por defecto 5173.
    # Cambialo si ese puerto esta ocupado en la VPS:  PORT=5190 docker compose ... up -d
    ports:
      - "${PORT:-5173}:80"
    restart: unless-stopped
